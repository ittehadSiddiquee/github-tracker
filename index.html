<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-container">
        <section class="login-card">
            <img src="assets/github-logo.png" alt="Logo" class="login-logo">
            <h1 class="login-title">GitHub Issues Tracker</h1>
            <p class="login-subtitle">Sign in to manage your issues</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required>
                    <p class="input-hint">Default: admin</p>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                    <p class="input-hint">Default: admin123</p>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="demo-box">
                <p class="divider-text">OR</p>
                <div class="divider-line"></div>
                <p class="demo-label">Demo Credentials:</p>
                <p class="credential-item"><strong>Username:</strong> admin</p>
                <p class="credential-item"><strong>Password:</strong> admin123</p>
            </div>
        </section>
        </main>

    <script src="login.js"></script>
</body>
</html>
